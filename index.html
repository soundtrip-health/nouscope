<!DOCTYPE html>
<html lang="en" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nouscope</title>
    <meta
      name="description"
      content="An audio-reactive 3D particle visualizer with optional Muse EEG biometric integration, built with Three.js and WebGL."
    />
    <meta name="author" content="Soundtrip" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nouscope" />
    <meta
      property="og:description"
      content="Audio-reactive 3D particle system with optional Muse EEG/PPG/IMU integration — built with Three.js and WebGL."
    />
    <meta property="og:type" content="website" />

    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="/src/scss/style.scss" />
    <script>
      document.documentElement.className = 'js'
    </script>
    <script type="module" src="/src/js/index.js"></script>
  </head>
  <body class="demo-1">
    <main>
      <div class="content"></div>
      <div class="bio-panel" id="bio-panel" hidden>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">EEG</span>
            <div class="eeg-quality-dots" id="eeg-quality-dots">
              <span class="quality-dot" data-ch="0" title="TP9"></span>
              <span class="quality-dot" data-ch="1" title="AF7"></span>
              <span class="quality-dot" data-ch="2" title="AF8"></span>
              <span class="quality-dot" data-ch="3" title="TP10"></span>
            </div>
          </div>
          <canvas id="eeg-canvas" width="280" height="90"></canvas>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">EEG BANDS</span>
          </div>
          <div class="bio-bands-body">
            <canvas id="band-canvas" width="200" height="75"></canvas>
            <div class="bio-band-legend">
              <div class="bio-band-item"><span style="color:#a78bfa">δ</span><span class="bio-band-val" id="band-val-delta">—</span></div>
              <div class="bio-band-item"><span style="color:#60a5fa">θ</span><span class="bio-band-val" id="band-val-theta">—</span></div>
              <div class="bio-band-item"><span style="color:#34d399">α</span><span class="bio-band-val" id="band-val-alpha">—</span></div>
              <div class="bio-band-item"><span style="color:#fbbf24">β</span><span class="bio-band-val" id="band-val-beta">—</span></div>
              <div class="bio-band-item"><span style="color:#f87171">γ</span><span class="bio-band-val" id="band-val-gamma">—</span></div>
            </div>
          </div>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">PPG</span>
            <span class="bio-hr" id="bio-hr"></span>
          </div>
          <canvas id="ppg-canvas" width="280" height="60"></canvas>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">IMU</span>
            <span class="bio-imu-legend">
              <span style="color:#4fc3f7">A</span>
              <span style="color:#ef9a9a">G</span>
            </span>
          </div>
          <canvas id="imu-canvas" width="280" height="60"></canvas>
        </div>
      </div>
      <div class="eeg-controls" id="eeg-controls">
        <span class="eeg-status" id="eeg-status"></span>
        <button id="eeg-connect">Connect EEG</button>
        <span class="heart-rate-display" id="heart-rate"></span>
        <button class="bio-toggle" id="bio-toggle" hidden title="Click to show/hide raw bio data">◉</button>
        <button class="controls-jellyfin-btn" id="jellyfin-btn" title="Browse Jellyfin music library">☁ Jellyfin</button>
        <label class="controls-upload-btn" title="Upload audio file">
          ↑ Track
          <input type="file" id="audio-upload" accept="audio/*" />
        </label>
      </div>

      <!-- Jellyfin browser modal -->
      <div id="jellyfin-modal" hidden>
        <div id="jellyfin-dialog">
          <div class="jellyfin-dialog-header">
            <span class="jellyfin-dialog-title">Jellyfin</span>
            <button id="jellyfin-close" class="jellyfin-close-btn" title="Close">×</button>
          </div>

          <!-- Login view -->
          <div id="jellyfin-login">
            <form id="jellyfin-login-form" autocomplete="on">
              <div class="jellyfin-field">
                <label for="jellyfin-server-url">Server URL</label>
                <input type="url" id="jellyfin-server-url" placeholder="http://192.168.1.100:8096" required autocomplete="url" />
              </div>
              <label class="jellyfin-toggle-label">
                <input type="checkbox" id="jellyfin-auth-toggle" />
                Use API key instead of username/password
              </label>
              <div id="jellyfin-userpass">
                <div class="jellyfin-field">
                  <label for="jellyfin-username">Username</label>
                  <input type="text" id="jellyfin-username" autocomplete="username" />
                </div>
                <div class="jellyfin-field">
                  <label for="jellyfin-password">Password</label>
                  <input type="password" id="jellyfin-password" autocomplete="current-password" />
                </div>
              </div>
              <div id="jellyfin-apikey-wrap" hidden>
                <div class="jellyfin-field">
                  <label for="jellyfin-api-key">API Key</label>
                  <input type="text" id="jellyfin-api-key" autocomplete="off" />
                </div>
              </div>
              <p id="jellyfin-login-error" class="jellyfin-error"></p>
              <button type="submit" id="jellyfin-submit">Connect</button>
            </form>
          </div>

          <!-- Browser view -->
          <div id="jellyfin-browser" hidden>
            <div class="jellyfin-browser-toolbar">
              <input type="search" id="jellyfin-search" placeholder="Search…" />
              <button id="jellyfin-disconnect">Disconnect</button>
            </div>
            <ul id="jellyfin-track-list"></ul>
            <button id="jellyfin-load-more" class="jellyfin-load-more" hidden>Load more</button>
          </div>
        </div>
      </div>
      <div class="user_interaction">
        <p class="user_interaction__label">Click to start</p>
        <p class="demo-hint">No EEG headset? The visualizer works great with audio only.</p>
      </div>
      <!-- Shown only in browsers that lack Web Bluetooth (Firefox, Safari) -->
      <div class="browser-warning" id="bt-warning" hidden>
        EEG requires Chrome or Edge (Web Bluetooth API).
        The visualizer works without EEG in any modern browser.
      </div>
    </main>
    <script>
      if (!navigator.bluetooth) {
        document.getElementById('bt-warning').hidden = false
      }
    </script>
  </body>
</html>
