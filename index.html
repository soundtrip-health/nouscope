<!DOCTYPE html>
<html lang="en" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nouscope</title>
    <meta
      name="description"
      content="A Muse EEG/PPG/IMU biometric visualizer with optional local-audio playback and real-time neural-entrainment analysis."
    />
    <meta name="author" content="Soundtrip" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nouscope" />
    <meta
      property="og:description"
      content="Muse EEG/PPG/IMU biometric visualizer with optional local-audio playback and neural-entrainment analysis."
    />
    <meta property="og:type" content="website" />

    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="/src/scss/style.scss" />
    <script>
      document.documentElement.className = 'js'
    </script>
    <script type="module" src="/src/js/index.js"></script>
  </head>
  <body class="demo-1">
    <!-- Two independent, isolated views: #session-view is the original
         single-session app (untouched); #multitrack-view is a separate
         opt-in feature for reviewing several loaded .jsonl recordings side
         by side. Nothing in #multitrack-view shares ids or wrapper classes
         with #session-view, so nothing here can affect the original tab.
         A compact top-right dropdown rather than a full-width bar, so it
         can't cover the EEG dots; the session-label (track name) sits
         top-center in the single view to stay clear of it. -->
    <select class="view-select" id="view-select" title="Switch view">
      <option value="session" selected>Single Track</option>
      <option value="multitrack">Multiple Tracks</option>
    </select>

    <main id="session-view">
      <span class="session-label" id="scrub-session-label"></span>

      <!-- The one data panel: every graph is rendered from the stored session
           timeline (SessionStore) at the scrubber's playhead. Parked at the
           leading edge it reads as a live monitor; dragged back, it replays. -->
      <div class="bio-panel analysis-panel" id="analysis-panel" hidden>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">EEG</span>
            <div class="eeg-quality-dots" id="an-quality-dots">
              <span class="quality-dot" data-ch="0" title="TP9"></span>
              <span class="quality-dot" data-ch="1" title="AF7"></span>
              <span class="quality-dot" data-ch="2" title="AF8"></span>
              <span class="quality-dot" data-ch="3" title="TP10"></span>
            </div>
          </div>
          <div class="an-plot-wrap">
            <canvas id="an-eeg-canvas" width="280" height="90"></canvas>
          </div>
        </div>
        <div class="bio-section bio-spec-section">
          <div class="bio-section-header">
            <span class="bio-label">SPECTROGRAM</span>
          </div>
          <div class="bio-spec-body">
            <div class="bio-spec-axis">
              <span>50</span>
              <span>8</span>
            </div>
            <div class="an-plot-wrap">
              <canvas id="an-spec-canvas" width="280" height="86"></canvas>
            </div>
          </div>
        </div>
        <div class="bio-section bio-spec-lo-section">
          <div class="bio-section-header">
            <span class="bio-label">DELTA / THETA</span>
          </div>
          <div class="bio-spec-body">
            <div class="bio-spec-axis">
              <span>8</span>
              <span>4</span>
              <span>0.5</span>
            </div>
            <div class="an-plot-wrap">
              <canvas id="an-spec-lo-canvas" width="280" height="76"></canvas>
            </div>
          </div>
        </div>
        <div class="bio-section bio-spec-audio-section" id="an-audio-section">
          <div class="bio-section-header">
            <span class="bio-label">AUDIO TEMPO</span>
            <span class="bio-entrain-value" id="an-entrain-value"></span>
            <span class="bio-window-stat" id="an-entrain-avg"></span>
          </div>
          <div class="bio-spec-body">
            <div class="bio-spec-axis">
              <span>5</span>
              <span>2.5</span>
              <span>0.5</span>
            </div>
            <div class="an-plot-wrap">
              <canvas id="an-spec-audio-canvas" width="280" height="46"></canvas>
            </div>
          </div>
          <div class="bio-entrain-bar" id="an-entrain-bar">
            <div class="bio-entrain-fill" id="an-entrain-fill"></div>
          </div>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">EEG BANDS</span>
          </div>
          <div class="bio-bands-body">
            <div class="an-plot-wrap">
              <canvas id="an-band-canvas" width="200" height="75"></canvas>
            </div>
            <div class="bio-band-legend">
              <div class="bio-band-item" id="an-band-item-delta"><span class="glyph-delta">δ</span><span class="bio-band-val" id="an-band-val-delta">—</span></div>
              <div class="bio-band-item" id="an-band-item-theta"><span class="glyph-theta">θ</span><span class="bio-band-val" id="an-band-val-theta">—</span></div>
              <div class="bio-band-item" id="an-band-item-alpha"><span class="glyph-alpha">α</span><span class="bio-band-val" id="an-band-val-alpha">—</span></div>
              <div class="bio-band-item" id="an-band-item-beta"><span class="glyph-beta">β</span><span class="bio-band-val" id="an-band-val-beta">—</span></div>
              <div class="bio-band-item" id="an-band-item-gamma"><span class="glyph-gamma">γ</span><span class="bio-band-val" id="an-band-val-gamma">—</span></div>
            </div>
          </div>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">COMPLEXITY (MSE)</span>
            <span class="bio-mse-value" id="an-mse-value"></span>
          </div>
          <div class="bio-mse-body">
            <div class="an-plot-wrap">
              <canvas id="an-mse-canvas" width="200" height="75"></canvas>
            </div>
            <div class="bio-mse-legend">
              <div class="bio-mse-item"><span class="glyph-mse-1">τ=1</span><span class="bio-mse-val" id="an-mse-val-0">—</span></div>
              <div class="bio-mse-item"><span class="glyph-mse-2">τ=3</span><span class="bio-mse-val" id="an-mse-val-1">—</span></div>
              <div class="bio-mse-item"><span class="glyph-mse-3">τ=5</span><span class="bio-mse-val" id="an-mse-val-2">—</span></div>
              <div class="bio-mse-item"><span class="glyph-mse-4">τ=7</span><span class="bio-mse-val" id="an-mse-val-3">—</span></div>
              <div class="bio-mse-item"><span class="glyph-mse-5">τ=9</span><span class="bio-mse-val" id="an-mse-val-4">—</span></div>
            </div>
          </div>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">PPG</span>
            <span class="bio-hr" id="an-hr"></span>
            <span class="bio-window-stat" id="an-hr-avg"></span>
          </div>
          <div class="an-plot-wrap">
            <canvas id="an-ppg-canvas" width="280" height="60"></canvas>
          </div>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">IMU</span>
            <span class="bio-imu-legend">
              <span class="glyph-imu-accel">A</span>
              <span class="glyph-imu-gyro">G</span>
            </span>
          </div>
          <div class="an-plot-wrap">
            <canvas id="an-imu-canvas" width="280" height="60"></canvas>
          </div>
        </div>
      </div>

      <!-- Movie-style transport: moves the playhead every panel renders at. -->
      <div class="scrubber" id="scrubber" hidden>
        <button class="scrub-play" id="scrub-play" title="Play / pause (Space)">▶</button>
        <span class="scrub-time" id="scrub-time">00:00</span>
        <div class="scrub-timeline" id="scrub-timeline" title="Shortcuts: ← / → to skip 5s, Home / End for start / end">
          <div class="scrub-track" id="scrub-track">
            <div class="scrub-fill" id="scrub-fill"></div>
            <div class="scrub-head" id="scrub-head"></div>
          </div>
          <canvas class="scrub-ribbon" id="scrub-ribbon"></canvas>
          <div class="scrub-ticks" id="scrub-ticks"></div>
          <div class="scrub-hover-time" id="scrub-hover-time" hidden></div>
        </div>
        <span class="scrub-time scrub-duration" id="scrub-duration">00:00</span>
        <button class="scrub-btn" id="scrub-live" title="Jump to the latest data (End)">● LIVE</button>
        <button class="scrub-btn" id="scrub-speed" title="Playback speed">1×</button>
      </div>

      <div class="eeg-controls" id="eeg-controls">
        <span class="eeg-battery" id="eeg-status" title="Battery">
          <svg class="battery-icon" viewBox="0 0 10 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect class="battery-cap" x="3" y="0" width="4" height="2" rx="1" ry="1"/>
            <rect class="battery-body" x="0.5" y="2.5" width="9" height="19" rx="2" ry="2"/>
            <rect class="battery-fill" x="1.5" y="21" width="7" height="0" rx="1" ry="1"/>
          </svg>
        </span>
        <button id="eeg-connect">Connect EEG</button>
        <span class="heart-rate-display" id="heart-rate"></span>
        <button class="bio-record" id="bio-record" hidden title="Record raw data to JSONL">⏺</button>
        <span class="bio-record-time" id="bio-record-time" hidden></span>
        <button id="pause-btn" hidden title="Pause/resume playback">⏸</button>
        <button id="mic-btn" title="Use microphone as audio source">Microphone</button>
        <label class="controls-upload-btn" title="Upload audio file">
          ↑ Track
          <input type="file" id="audio-upload" accept="audio/*" />
        </label>
        <label class="controls-upload-btn" title="Load a saved .jsonl recording to analyze">
          ↑ Recording
          <input type="file" id="recording-upload" accept=".jsonl,application/x-ndjson" />
        </label>
      </div>

      <!-- Shown only in browsers that lack Web Bluetooth (Firefox, Safari) -->
      <div class="browser-warning" id="bt-warning" hidden>
        EEG requires Chrome or Edge (Web Bluetooth API).
        The visualizer works without EEG in any modern browser.
      </div>
    </main>

    <!-- Multi-Track tab: file-review only, no live EEG. Every class here is
         `mt-`-prefixed (aside from the generic `an-*` canvas/readout lookup
         classes MultiTrackDisplay queries and pure color-utility classes like
         `.glyph-*`/`.quality-dot`, none of which carry any analysis-mode-
         specific override in the original stylesheet) so nothing here can be
         affected by, or affect, #session-view's styling. -->
    <main id="multitrack-view" hidden>
      <template id="mt-track-lane-template">
        <div class="mt-bio-panel">
          <div class="mt-bio-section" data-panel="eeg">
            <div class="mt-bio-section-header">
              <span class="mt-bio-label">EEG</span>
              <div class="mt-eeg-quality-dots an-quality-dots">
                <span class="quality-dot" data-ch="0" title="TP9"></span>
                <span class="quality-dot" data-ch="1" title="AF7"></span>
                <span class="quality-dot" data-ch="2" title="AF8"></span>
                <span class="quality-dot" data-ch="3" title="TP10"></span>
              </div>
            </div>
            <div class="mt-plot-wrap">
              <canvas class="an-eeg-canvas" width="280" height="90"></canvas>
            </div>
          </div>
          <div class="mt-bio-section mt-bio-spec-section" data-panel="spec">
            <div class="mt-bio-section-header">
              <span class="mt-bio-label">SPECTROGRAM</span>
            </div>
            <div class="mt-bio-spec-body">
              <div class="mt-bio-spec-axis">
                <span>50</span>
                <span>8</span>
              </div>
              <div class="mt-plot-wrap">
                <canvas class="an-spec-canvas" width="280" height="86"></canvas>
              </div>
            </div>
          </div>
          <div class="mt-bio-section mt-bio-spec-lo-section" data-panel="specLo">
            <div class="mt-bio-section-header">
              <span class="mt-bio-label">DELTA / THETA</span>
            </div>
            <div class="mt-bio-spec-body">
              <div class="mt-bio-spec-axis">
                <span>8</span>
                <span>4</span>
                <span>0.5</span>
              </div>
              <div class="mt-plot-wrap">
                <canvas class="an-spec-lo-canvas" width="280" height="76"></canvas>
              </div>
            </div>
          </div>
          <div class="mt-bio-section mt-bio-spec-audio-section an-audio-section" data-panel="specAudio">
            <div class="mt-bio-section-header">
              <span class="mt-bio-label">AUDIO TEMPO</span>
              <span class="mt-bio-entrain-value an-entrain-value"></span>
              <span class="mt-bio-window-stat an-entrain-avg"></span>
            </div>
            <div class="mt-bio-spec-body">
              <div class="mt-bio-spec-axis">
                <span>5</span>
                <span>2.5</span>
                <span>0.5</span>
              </div>
              <div class="mt-plot-wrap">
                <canvas class="an-spec-audio-canvas" width="280" height="46"></canvas>
              </div>
            </div>
            <div class="mt-bio-entrain-bar">
              <div class="mt-bio-entrain-fill an-entrain-fill"></div>
            </div>
          </div>
          <div class="mt-bio-section" data-panel="bands">
            <div class="mt-bio-section-header">
              <span class="mt-bio-label">EEG BANDS</span>
            </div>
            <div class="mt-bio-bands-body">
              <div class="mt-plot-wrap">
                <canvas class="an-band-canvas" width="200" height="75"></canvas>
              </div>
              <div class="mt-bio-band-legend">
                <div class="mt-bio-band-item an-band-item-delta"><span class="glyph-delta">δ</span><span class="mt-bio-band-val an-band-val-delta">—</span></div>
                <div class="mt-bio-band-item an-band-item-theta"><span class="glyph-theta">θ</span><span class="mt-bio-band-val an-band-val-theta">—</span></div>
                <div class="mt-bio-band-item an-band-item-alpha"><span class="glyph-alpha">α</span><span class="mt-bio-band-val an-band-val-alpha">—</span></div>
                <div class="mt-bio-band-item an-band-item-beta"><span class="glyph-beta">β</span><span class="mt-bio-band-val an-band-val-beta">—</span></div>
                <div class="mt-bio-band-item an-band-item-gamma"><span class="glyph-gamma">γ</span><span class="mt-bio-band-val an-band-val-gamma">—</span></div>
              </div>
            </div>
          </div>
          <div class="mt-bio-section" data-panel="mse">
            <div class="mt-bio-section-header">
              <span class="mt-bio-label">COMPLEXITY (MSE)</span>
              <span class="mt-bio-mse-value an-mse-value"></span>
            </div>
            <div class="mt-bio-mse-body">
              <div class="mt-plot-wrap">
                <canvas class="an-mse-canvas" width="200" height="75"></canvas>
              </div>
              <div class="mt-bio-mse-legend">
                <div class="mt-bio-mse-item"><span class="glyph-mse-1">τ=1</span><span class="mt-bio-mse-val an-mse-val-0">—</span></div>
                <div class="mt-bio-mse-item"><span class="glyph-mse-2">τ=3</span><span class="mt-bio-mse-val an-mse-val-1">—</span></div>
                <div class="mt-bio-mse-item"><span class="glyph-mse-3">τ=5</span><span class="mt-bio-mse-val an-mse-val-2">—</span></div>
                <div class="mt-bio-mse-item"><span class="glyph-mse-4">τ=7</span><span class="mt-bio-mse-val an-mse-val-3">—</span></div>
                <div class="mt-bio-mse-item"><span class="glyph-mse-5">τ=9</span><span class="mt-bio-mse-val an-mse-val-4">—</span></div>
              </div>
            </div>
          </div>
          <div class="mt-bio-section" data-panel="ppg">
            <div class="mt-bio-section-header">
              <span class="mt-bio-label">PPG</span>
              <span class="mt-bio-hr an-hr"></span>
              <span class="mt-bio-window-stat an-hr-avg"></span>
            </div>
            <div class="mt-plot-wrap">
              <canvas class="an-ppg-canvas" width="280" height="60"></canvas>
            </div>
          </div>
          <div class="mt-bio-section" data-panel="imu">
            <div class="mt-bio-section-header">
              <span class="mt-bio-label">IMU</span>
              <span class="mt-bio-imu-legend">
                <span class="glyph-imu-accel">A</span>
                <span class="glyph-imu-gyro">G</span>
              </span>
            </div>
            <div class="mt-plot-wrap">
              <canvas class="an-imu-canvas" width="280" height="60"></canvas>
            </div>
          </div>
        </div>
      </template>

      <label class="controls-upload-btn mt-add-track-btn" title="Load a saved .jsonl recording as a new track">
        ↑ Track
        <input type="file" id="mt-add-track-input" accept=".jsonl,application/x-ndjson" />
      </label>

      <!-- Stimulus audio (at most one) — played back in sync with the master
           transport, see AudioTrack.js/MultiTrackApp.js. -->
      <label class="controls-upload-btn mt-add-music-btn" title="Load the stimulus audio used in these sessions">
        ↑ Music
        <input type="file" id="mt-add-music-input" accept="audio/*" />
      </label>

      <div id="mt-audio-mount"></div>

      <div class="mt-tracks" id="mt-tracks"></div>

      <!-- Master transport for the track stack — a sibling of #scrubber above,
           with its own mt-scrub-* ids (see MultiTrackScrubber.js). -->
      <div class="scrubber" id="mt-scrubber" hidden>
        <button class="scrub-play" id="mt-scrub-play" title="Play / pause (Space)">▶</button>
        <span class="scrub-time" id="mt-scrub-time">00:00</span>
        <div class="scrub-timeline" id="mt-scrub-timeline" title="Shortcuts: ← / → to skip 5s, Home / End for start / end">
          <div class="scrub-track" id="mt-scrub-track">
            <div class="scrub-fill" id="mt-scrub-fill"></div>
            <div class="scrub-head" id="mt-scrub-head"></div>
          </div>
          <div class="scrub-ticks" id="mt-scrub-ticks"></div>
          <div class="scrub-hover-time" id="mt-scrub-hover-time" hidden></div>
        </div>
        <span class="scrub-time scrub-duration" id="mt-scrub-duration">00:00</span>
        <button class="scrub-btn" id="mt-scrub-live" title="Jump to the latest data (End)" hidden>● LIVE</button>
        <button class="scrub-btn" id="mt-scrub-speed" title="Playback speed">1×</button>

        <!-- Markers: annotate a moment ("music started") at the current
             playhead — see MultiTrackApp.js's marker wiring. -->
        <input type="text" id="mt-marker-label-input" class="mt-marker-label-input" placeholder="Marker label" title="Label for a new marker (or press M for a quick default-labeled one)" />
        <button class="scrub-btn" id="mt-marker-add-btn" title="Add a marker at the current playhead (M)">+ Marker</button>
        <details class="mt-marker-menu" id="mt-marker-menu">
          <summary class="mt-track-menu-btn scrub-btn" title="View / edit / jump to markers">🏷 Markers (<span id="mt-marker-count">0</span>)</summary>
          <div class="mt-marker-popover" id="mt-marker-list"></div>
        </details>
      </div>
    </main>

    <script>
      if (!navigator.bluetooth) {
        document.getElementById('bt-warning').hidden = false
      }
    </script>
  </body>
</html>
