<!DOCTYPE html>
<html lang="en" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nouscope</title>
    <meta
      name="description"
      content="A Muse EEG/PPG/IMU biometric visualizer with optional local-audio playback and real-time neural-entrainment analysis."
    />
    <meta name="author" content="Soundtrip" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nouscope" />
    <meta
      property="og:description"
      content="Muse EEG/PPG/IMU biometric visualizer with optional local-audio playback and neural-entrainment analysis."
    />
    <meta property="og:type" content="website" />

    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="/src/scss/style.scss" />
    <script>
      document.documentElement.className = 'js'
    </script>
    <script type="module" src="/src/js/index.js"></script>
  </head>
  <body class="demo-1">
    <main>
      <div class="bio-panel" id="bio-panel" hidden>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">EEG</span>
            <div class="eeg-quality-dots" id="eeg-quality-dots">
              <span class="quality-dot" data-ch="0" title="TP9"></span>
              <span class="quality-dot" data-ch="1" title="AF7"></span>
              <span class="quality-dot" data-ch="2" title="AF8"></span>
              <span class="quality-dot" data-ch="3" title="TP10"></span>
            </div>
          </div>
          <canvas id="eeg-canvas" width="280" height="90"></canvas>
        </div>
        <div class="bio-section bio-spec-section">
          <div class="bio-section-header">
            <span class="bio-label">SPECTROGRAM</span>
          </div>
          <div class="bio-spec-body">
            <div class="bio-spec-axis">
              <span>50</span>
              <span>8</span>
            </div>
            <canvas id="spec-canvas" width="280" height="86"></canvas>
          </div>
        </div>
        <div class="bio-section bio-spec-lo-section">
          <div class="bio-section-header">
            <span class="bio-label">DELTA / THETA</span>
          </div>
          <div class="bio-spec-body">
            <div class="bio-spec-axis">
              <span>8</span>
              <span>4</span>
              <span>0.5</span>
            </div>
            <canvas id="spec-lo-canvas" width="280" height="76"></canvas>
          </div>
        </div>
        <div class="bio-section bio-spec-audio-section">
          <div class="bio-section-header">
            <span class="bio-label">AUDIO TEMPO</span>
            <span class="bio-entrain-value" id="bio-entrain-value"></span>
          </div>
          <div class="bio-spec-body">
            <div class="bio-spec-axis">
              <span>5</span>
              <span>2.5</span>
              <span>0.5</span>
            </div>
            <canvas id="spec-audio-canvas" width="280" height="46"></canvas>
          </div>
          <div class="bio-entrain-bar" id="bio-entrain-bar">
            <div class="bio-entrain-fill" id="bio-entrain-fill"></div>
          </div>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">EEG BANDS</span>
          </div>
          <div class="bio-bands-body">
            <canvas id="band-canvas" width="200" height="75"></canvas>
            <div class="bio-band-legend">
              <div class="bio-band-item" id="band-item-delta"><span class="glyph-delta">δ</span><span class="bio-band-val" id="band-val-delta">—</span></div>
              <div class="bio-band-item" id="band-item-theta"><span class="glyph-theta">θ</span><span class="bio-band-val" id="band-val-theta">—</span></div>
              <div class="bio-band-item" id="band-item-alpha"><span class="glyph-alpha">α</span><span class="bio-band-val" id="band-val-alpha">—</span></div>
              <div class="bio-band-item" id="band-item-beta"><span class="glyph-beta">β</span><span class="bio-band-val" id="band-val-beta">—</span></div>
              <div class="bio-band-item" id="band-item-gamma"><span class="glyph-gamma">γ</span><span class="bio-band-val" id="band-val-gamma">—</span></div>
            </div>
          </div>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">COMPLEXITY (MSE)</span>
            <span class="bio-mse-value" id="bio-mse-value"></span>
          </div>
          <div class="bio-mse-body">
            <canvas id="mse-canvas" width="200" height="75"></canvas>
            <div class="bio-mse-legend">
              <div class="bio-mse-item"><span class="glyph-mse-1">τ=1</span><span class="bio-mse-val" id="mse-val-0">—</span></div>
              <div class="bio-mse-item"><span class="glyph-mse-2">τ=3</span><span class="bio-mse-val" id="mse-val-1">—</span></div>
              <div class="bio-mse-item"><span class="glyph-mse-3">τ=5</span><span class="bio-mse-val" id="mse-val-2">—</span></div>
              <div class="bio-mse-item"><span class="glyph-mse-4">τ=7</span><span class="bio-mse-val" id="mse-val-3">—</span></div>
              <div class="bio-mse-item"><span class="glyph-mse-5">τ=9</span><span class="bio-mse-val" id="mse-val-4">—</span></div>
            </div>
          </div>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">PPG</span>
            <span class="bio-hr" id="bio-hr"></span>
          </div>
          <canvas id="ppg-canvas" width="280" height="60"></canvas>
        </div>
        <div class="bio-section">
          <div class="bio-section-header">
            <span class="bio-label">IMU</span>
            <span class="bio-imu-legend">
              <span class="glyph-imu-accel">A</span>
              <span class="glyph-imu-gyro">G</span>
            </span>
          </div>
          <canvas id="imu-canvas" width="280" height="60"></canvas>
        </div>
      </div>
      <div class="eeg-controls" id="eeg-controls">
        <span class="eeg-battery" id="eeg-status" title="Battery">
          <svg class="battery-icon" viewBox="0 0 10 22" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect class="battery-cap" x="3" y="0" width="4" height="2" rx="1" ry="1"/>
            <rect class="battery-body" x="0.5" y="2.5" width="9" height="19" rx="2" ry="2"/>
            <rect class="battery-fill" x="1.5" y="21" width="7" height="0" rx="1" ry="1"/>
          </svg>
        </span>
        <button id="eeg-connect">Connect EEG</button>
        <span class="heart-rate-display" id="heart-rate"></span>
        <button class="bio-record" id="bio-record" hidden title="Record raw data to JSONL">⏺</button>
        <span class="bio-record-time" id="bio-record-time" hidden></span>
        <button id="pause-btn" hidden title="Pause/resume playback">⏸</button>
        <button id="mic-btn" title="Use microphone as audio source">🎤</button>
        <label class="controls-upload-btn" title="Upload audio file">
          ↑ Track
          <input type="file" id="audio-upload" accept="audio/*" />
        </label>
      </div>

      <!-- Shown only in browsers that lack Web Bluetooth (Firefox, Safari) -->
      <div class="browser-warning" id="bt-warning" hidden>
        EEG requires Chrome or Edge (Web Bluetooth API).
        The visualizer works without EEG in any modern browser.
      </div>
    </main>
    <script>
      if (!navigator.bluetooth) {
        document.getElementById('bt-warning').hidden = false
      }
    </script>
  </body>
</html>
